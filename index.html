<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecretChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── AUTH SCREEN ─────────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-bg">
      <div class="auth-grid"></div>
      <div class="auth-glow"></div>
    </div>

    <div class="auth-container">
      <!-- Logo -->
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M4 8C4 5.79 5.79 4 8 4H20C22.21 4 24 5.79 24 8V16C24 18.21 22.21 20 20 20H16L12 24L8 20H8C5.79 20 4 18.21 4 16V8Z" fill="currentColor"/>
          </svg>
        </div>
        <span class="brand-name">SecretChat</span>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Masuk</button>
        <button class="auth-tab" data-tab="register">Daftar</button>
      </div>

      <!-- Login Form -->
      <div id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Username</label>
          <input id="login-username" type="text" placeholder="Masukkan username" autocomplete="username" maxlength="20" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-pw-wrapper">
            <input id="login-password" type="password" placeholder="Masukkan password" autocomplete="current-password" />
            <button class="toggle-pw" type="button" data-target="login-password">
              <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button id="login-btn" class="btn-primary">
          <span>Masuk</span>
          <div class="btn-loader hidden"></div>
        </button>
      </div>

      <!-- Register Form -->
      <div id="register-form" class="auth-form">
        <div class="form-group">
          <label>Username <span class="hint-label">3–20 karakter</span></label>
          <input id="reg-username" type="text" placeholder="Buat username yang unik" autocomplete="username" maxlength="20" />
        </div>
        <div class="form-group">
          <label>Password <span class="hint-label">min. 4 karakter</span></label>
          <div class="input-pw-wrapper">
            <input id="reg-password" type="password" placeholder="Buat password" autocomplete="new-password" />
            <button class="toggle-pw" type="button" data-target="reg-password">
              <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Konfirmasi Password</label>
          <div class="input-pw-wrapper">
            <input id="reg-confirm" type="password" placeholder="Ulangi password" autocomplete="new-password" />
            <button class="toggle-pw" type="button" data-target="reg-confirm">
              <svg class="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button id="register-btn" class="btn-primary">
          <span>Buat Akun</span>
          <div class="btn-loader hidden"></div>
        </button>
      </div>
    </div>
  </div>

  <!-- ── ROOM SCREEN ─────────────────────────────────────────── -->
  <div id="room-screen" class="hidden">
    <div class="auth-bg">
      <div class="auth-grid"></div>
      <div class="auth-glow glow-green"></div>
    </div>

    <div class="auth-container room-container">
      <div class="room-header">
        <div class="auth-brand">
          <div class="brand-icon">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M4 8C4 5.79 5.79 4 8 4H20C22.21 4 24 5.79 24 8V16C24 18.21 22.21 20 20 20H16L12 24L8 20H8C5.79 20 4 18.21 4 16V8Z" fill="currentColor"/></svg>
          </div>
          <span class="brand-name">SecretChat</span>
        </div>
        <div class="room-user-info">
          <div class="avatar-sm" id="room-avatar"></div>
          <span id="room-welcome"></span>
          <button id="logout-btn" class="btn-icon" title="Logout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>

      <div class="room-options">
        <!-- Create Room -->
        <div class="room-card">
          <div class="room-card-icon create-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
          <h3>Buat Room Baru</h3>
          <p>Buat room chat dan bagikan kodenya ke temanmu</p>
          <div class="form-group">
            <input id="room-name-input" type="text" placeholder="Nama room (opsional)" maxlength="30" />
          </div>
          <div id="create-error" class="form-error hidden"></div>
          <button id="create-room-btn" class="btn-primary">
            <span>Buat Room</span>
            <div class="btn-loader hidden"></div>
          </button>
        </div>

        <div class="room-divider"><span>atau</span></div>

        <!-- Join Room -->
        <div class="room-card">
          <div class="room-card-icon join-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </div>
          <h3>Masuk ke Room</h3>
          <p>Masukkan kode room</p>
          <div class="form-group">
            <input id="room-code-input" type="text" placeholder="Kode Room (misal: AB1C2D)" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-family:var(--font-mono);font-size:18px;text-align:center" />
          </div>
          <div id="join-error" class="form-error hidden"></div>
          <button id="join-room-btn" class="btn-primary btn-outline">
            <span>Masuk Room</span>
            <div class="btn-loader hidden"></div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── CHAT SCREEN ─────────────────────────────────────────── -->
  <div id="chat-screen" class="hidden">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <svg width="16" height="16" viewBox="0 0 28 28" fill="none"><path d="M4 8C4 5.79 5.79 4 8 4H20C22.21 4 24 5.79 24 8V16C24 18.21 22.21 20 20 20H16L12 24L8 20H8C5.79 20 4 18.21 4 16V8Z" fill="currentColor"/></svg>
          <span>SecretChat</span>
        </div>
      </div>

      <!-- Room Info -->
      <div class="sidebar-room">
        <div class="sidebar-section-label">Room</div>
        <div class="room-info-box">
          <div class="room-name-display" id="sidebar-room-name">—</div>
          <div class="room-code-display">
            <span id="sidebar-room-code">—</span>
            <button id="copy-code-btn" class="btn-copy" title="Salin kode">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Salin
            </button>
          </div>
        </div>
      </div>

      <!-- Online Users -->
      <div class="sidebar-section-label" style="padding:0 16px;margin-bottom:6px">
        Online <span id="user-count" class="user-count-badge">0</span>
      </div>
      <ul id="online-list"></ul>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="avatar-sm" id="sidebar-avatar"></div>
          <span id="sidebar-username"></span>
        </div>
        <div class="sidebar-actions">
          <button id="leave-room-btn" class="btn-icon-sm" title="Keluar Room">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Chat -->
    <main id="chat-main">
      <!-- Header -->
      <header id="chat-header">
        <div class="header-left">
          <button id="sidebar-toggle" class="btn-icon-sm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="header-info">
            <span class="header-room-name" id="header-room-name">Room</span>
            <span class="header-room-code" id="header-room-code"></span>
          </div>
        </div>
        <div class="header-right">
          <div class="header-user">
            <div class="avatar-sm" id="header-avatar"></div>
            <span id="header-username"></span>
          </div>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages-container">
        <div id="messages-list"></div>
        <div id="typing-indicator" class="hidden">
          <span id="typing-text"></span>
          <span class="typing-dots"><span></span><span></span><span></span></span>
        </div>
      </div>

      <!-- Input Area -->
      <div id="input-area">
        <div id="input-toolbar">
          <button id="location-btn" class="toolbar-btn" title="Bagikan Lokasi">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </button>
        </div>
        <div id="input-wrapper">
          <textarea
            id="message-input"
            placeholder="Ketik pesan..."
            rows="1"
            maxlength="1000"
          ></textarea>
          <button id="send-btn" title="Kirim (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="input-hint">Enter kirim · Shift+Enter baris baru</p>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
